<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Создать GDD - Game Draft Feed</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a0f; color: #e2e8f0; font-family: system-ui, -apple-system, sans-serif; min-height: 100vh; }
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
nav { display: flex; align-items: center; gap: 16px; padding: 16px 0 24px; border-bottom: 1px solid #2a2a3a; margin-bottom: 24px; }
.nav-back { color: #64748b; text-decoration: none; font-size: 0.9rem; }
.nav-back:hover { color: #e2e8f0; }
h1 { font-size: 1.3rem; font-weight: 700; }
.btn { background: #21c55d; color: #0a0a0f; border: none; border-radius: 8px; padding: 12px 20px; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: opacity 0.2s; width: 100%; justify-content: center; }
.btn:hover:not(:disabled) { opacity: 0.85; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-ghost { background: transparent; color: #21c55d; border: 1px solid #21c55d; }
.btn-secondary { background: #1e293b; color: #e2e8f0; border: 1px solid #2a2a3a; }
textarea { width: 100%; background: #12121a; border: 1px solid #2a2a3a; border-radius: 8px; color: #e2e8f0; font-family: inherit; font-size: 0.95rem; padding: 14px; resize: vertical; min-height: 120px; outline: none; transition: border-color 0.2s; }
textarea:focus { border-color: #21c55d; }
input[type="text"] { width: 100%; background: #12121a; border: 1px solid #2a2a3a; border-radius: 8px; color: #e2e8f0; font-family: inherit; font-size: 0.95rem; padding: 12px 14px; outline: none; transition: border-color 0.2s; }
input[type="text"]:focus { border-color: #21c55d; }
label { display: block; color: #64748b; font-size: 0.85rem; margin-bottom: 8px; }
.field { margin-bottom: 16px; }
.progress { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 28px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #2a2a3a; transition: background 0.3s; }
.dot.active { background: #21c55d; }
.dot.done { background: #21c55d88; }
.line { width: 32px; height: 2px; background: #2a2a3a; transition: background 0.3s; }
.line.done { background: #21c55d44; }
.step { display: none; }
.step.active { display: block; }
.step-title { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #94a3b8; }
.draft-preview { background: #12121a; border: 1px solid #2a2a3a; border-radius: 12px; padding: 20px; margin-bottom: 16px; line-height: 1.7; max-height: 420px; overflow-y: auto; }
.section-header { color: #21c55d; font-weight: 700; font-size: 1rem; margin: 16px 0 6px; display: block; }
.section-header:first-child { margin-top: 0; }
.bullet { color: #e2e8f0; padding-left: 20px; position: relative; margin: 4px 0; display: block; }
.bullet::before { content: ''; position: absolute; left: 8px; top: 0.65em; width: 4px; height: 4px; background: #21c55d; border-radius: 50%; }
.body-text { color: #94a3b8; display: block; margin: 5px 0; }
.spinner-inline { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(0,0,0,0.3); border-top-color: #0a0a0f; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.key-hint { background: #12121a; border: 1px solid #2a2a3a; border-radius: 8px; padding: 12px; margin-bottom: 16px; font-size: 0.8rem; color: #64748b; }
.key-hint a { color: #21c55d; text-decoration: none; }
.error-box { background: #ff6b6b11; border: 1px solid #ff6b6b44; border-radius: 8px; padding: 12px; color: #ff6b6b; font-size: 0.85rem; margin-bottom: 16px; display: none; }
.blocked-box { background: #ff6b6b11; border: 1px solid #ff6b6b44; border-radius: 12px; padding: 20px; margin-bottom: 16px; text-align: center; }
.blocked-box p { color: #ff6b6b; font-size: 1rem; font-weight: 600; margin-bottom: 16px; }
.draft-actions { display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>
<div class="container">
  <nav>
    <a href="index.html" class="nav-back">← Назад</a>
    <h1>✏️ Создать GDD</h1>
  </nav>

  <div class="progress" id="progress">
    <div class="dot active" id="dot1"></div>
    <div class="line" id="line1"></div>
    <div class="dot" id="dot2"></div>
    <div class="line" id="line2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <!-- Шаг 1: Идея -->
  <div class="step active" id="step1">
    <div class="step-title">Шаг 1 — Твоя идея</div>
    <div class="key-hint" id="keyHint">
      🔑 Groq API ключ не введён. <a href="https://console.groq.com/keys" target="_blank">Получить ключ</a><br>
      Вставь ключ: <input type="text" id="keyInput" placeholder="gsk_..." style="margin-top:8px; font-size:0.8rem; padding:8px 10px;" oninput="saveKey(this.value)">
    </div>
    <div class="field">
      <label>Опиши свою игру</label>
      <textarea id="ideaInput" placeholder="Например: тактическая RPG с постапокалиптическим миром, где герой управляет группой выживших..." rows="5"></textarea>
    </div>
    <div class="error-box" id="error1"></div>
    <button class="btn" id="generateBtn" onclick="handleGenerate()">✨ Сгенерировать GDD</button>
  </div>

  <!-- Шаг 2: Просмотр GDD -->
  <div class="step" id="step2">
    <div class="step-title">Шаг 2 — Твой GDD</div>

    <!-- Нормальный контент -->
    <div id="step2ok">
      <div id="draftPreview" class="draft-preview"></div>
      <div class="draft-actions" id="draftActions">
        <button class="btn" onclick="goToStep3()">📤 Опубликовать</button>
        <button class="btn btn-ghost" onclick="showEditMode()">✏️ Редактировать</button>
      </div>
      <div id="editMode" style="display:none;">
        <div class="field">
          <label>Редактировать текст GDD</label>
          <textarea id="editTextarea" rows="12" style="min-height:200px;"></textarea>
        </div>
        <div class="field">
          <label>Комментарий для регенерации (необязательно)</label>
          <textarea id="regenComment" placeholder="Что изменить? Например: сделать больше упора на кооператив..." rows="3"></textarea>
        </div>
        <div class="error-box" id="error2"></div>
        <div style="display:flex;gap:10px;flex-direction:column;">
          <button class="btn" onclick="handleRegen()" id="regenBtn">🔄 Регенерировать</button>
          <button class="btn btn-secondary" onclick="applyEdit()">✅ Применить правки</button>
        </div>
      </div>
    </div>

    <!-- Заблокированный контент -->
    <div id="step2blocked" style="display:none;">
      <div class="blocked-box">
        <p>🚫 Запрос неприемлемый.</p>
        <button class="btn btn-ghost" onclick="startOver()">✏️ Создать новый драфт</button>
      </div>
    </div>
  </div>

  <!-- Шаг 3: Публикация -->
  <div class="step" id="step3">
    <div class="step-title">Шаг 3 — Публикация</div>
    <div class="field">
      <label>Название игры</label>
      <input type="text" id="titleInput" placeholder="Название вашего GDD">
    </div>
    <div class="field">
      <label>Жанр</label>
      <input type="text" id="genreInput" placeholder="RPG, Action, Strategy...">
    </div>
    <div class="field">
      <label>Ваше имя (для подписи)</label>
      <input type="text" id="authorInput" placeholder="Как вас называть?">
    </div>
    <div class="error-box" id="error3"></div>
    <button class="btn" id="publishBtn" onclick="handlePublish()">🚀 Опубликовать в ленту</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vfyqrsxcenksspvklhak.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZmeXFyc3hjZW5rc3NwdmtsaGFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NzIwMTQsImV4cCI6MjA4OTQ0ODAxNH0.4oTHiuHexv3rwcj_blkDTcALBXzadug38mtWga7yi-4';
const HEADERS = {
  'apikey': SUPABASE_KEY,
  'Authorization': 'Bearer ' + SUPABASE_KEY,
  'Content-Type': 'application/json',
  'Prefer': 'return=representation'
};

const SYSTEM_PROMPT = 'Ты опытный геймдизайнер и Concept Designer. Создавай Game Design Document (GDD) на русском языке.\n\nСтруктура GDD с эмодзи-заголовками:\n\uD83C\uDFAF Концепция — краткое описание игры (2-3 предложения)\n\uD83C\uDF0D Сеттинг — мир, атмосфера, время действия\n\uD83C\uDFAE Геймплей — основные механики, управление, цели\n\u2B50 Уникальная механика — чем отличается игра от других\n\uD83D\uDCC8 Прогрессия — развитие персонажа/уровней/системы\n\uD83C\uDFB5 Аудио — как игра звучит и ощущается\n\uD83C\uDFC6 Победа / Конец — условия победы для завершения\n\nПиши ёмко и содержательно. Без лишней воды. Объём — 300-500 слов.';

// Модерация GDD — проверяем сгенерированный текст
const MODERATION_CONTENT_PROMPT = 'Ты строгий модератор контента. Проверь текст GDD на наличие хотя бы одного из следующего:\n- нецензурная лексика, мат, ругательства на любом языке\n- оскорбления людей или групп людей\n- гомофобия, расизм, дискриминация по любому признаку\n- пропаганда насилия, экстремизма, терроризма\n- сексуальный или порнографический контент\n- спам или бессмысленный текст\n\nОтветь ТОЛЬКО одним словом: OK или BLOCK.';

// Модерация полей — проверяем название и имя
const MODERATION_FIELDS_PROMPT = 'Ты строгий модератор контента. Проверь предоставленный текст (название игры или имя автора) на наличие нецензурной лексики, оскорблений, дискриминации, мата или любого запрещённого контента.\n\nОтветь ТОЛЬКО одним словом: OK или BLOCK.';

let generatedContent = '';

(function init() {
  const params = new URLSearchParams(location.search);
  const urlKey = params.get('key');
  if (urlKey && urlKey.startsWith('gsk_')) localStorage.setItem('groq_key', urlKey);
  const key = localStorage.getItem('groq_key');
  if (key) document.getElementById('keyHint').style.display = 'none';
  const keyInput = document.getElementById('keyInput');
  if (keyInput && key) keyInput.value = key;
})();

function saveKey(val) {
  const v = val.trim();
  if (v.startsWith('gsk_')) {
    localStorage.setItem('groq_key', v);
    document.getElementById('keyHint').style.display = 'none';
  }
}

function getGroqKey() { return localStorage.getItem('groq_key') || ''; }

function setStep(n) {
  for (let i = 1; i <= 3; i++) {
    document.getElementById('step' + i).classList.toggle('active', i === n);
    const dot = document.getElementById('dot' + i);
    dot.classList.toggle('active', i === n);
    dot.classList.toggle('done', i < n);
    if (i < 3) document.getElementById('line' + i).classList.toggle('done', i < n);
  }
}

function showError(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError(id) { document.getElementById(id).style.display = 'none'; }

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderContent(text) {
  if (!text) return '';
  const lines = text.split('\n');
  let html = '';
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) { html += '<br>'; continue; }
    const emojiRe = /^\p{Emoji}/u;
    if (emojiRe.test(trimmed)) {
      html += '<span class="section-header">' + escapeHtml(trimmed) + '</span>';
    } else if (trimmed.startsWith('\u2022') || trimmed.startsWith('-') || trimmed.startsWith('*')) {
      html += '<span class="bullet">' + escapeHtml(trimmed.replace(/^[\u2022\-\*]\s*/, '')) + '</span>';
    } else {
      html += '<span class="body-text">' + escapeHtml(trimmed) + '</span>';
    }
  }
  return html;
}

async function callGroq(messages, maxTokens) {
  const key = getGroqKey();
  if (!key) throw new Error('Groq API ключ не введён');
  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages, temperature: 0.8, max_tokens: maxTokens || 1500 })
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || 'Groq API error: ' + resp.status);
  }
  const data = await resp.json();
  return data.choices[0].message.content;
}

async function moderateContent(text) {
  const verdict = await callGroq([
    { role: 'system', content: MODERATION_CONTENT_PROMPT },
    { role: 'user', content: text }
  ], 10);
  return verdict.trim().toUpperCase().startsWith('OK');
}

async function moderateField(text) {
  const verdict = await callGroq([
    { role: 'system', content: MODERATION_FIELDS_PROMPT },
    { role: 'user', content: text }
  ], 10);
  return verdict.trim().toUpperCase().startsWith('OK');
}

function showGdd(content) {
  // Показываем нормальный GDD, скрываем блок-экран
  document.getElementById('step2ok').style.display = 'block';
  document.getElementById('step2blocked').style.display = 'none';
  document.getElementById('draftPreview').innerHTML = renderContent(content);
  document.getElementById('editTextarea').value = content;
  document.getElementById('editMode').style.display = 'none';
  document.getElementById('draftActions').style.display = 'flex';
}

function showBlocked() {
  // Показываем экран блокировки, скрываем GDD
  document.getElementById('step2ok').style.display = 'none';
  document.getElementById('step2blocked').style.display = 'block';
}

async function handleGenerate() {
  const idea = document.getElementById('ideaInput').value.trim();
  if (!idea) { showError('error1', 'Введите идею игры'); return; }
  if (idea.length < 15) { showError('error1', 'Опишите идею подробнее — минимум 15 символов'); return; }
  hideError('error1');
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span> Генерируем...';
  try {
    const content = await callGroq([
      { role: 'system', content: SYSTEM_PROMPT },
      { role: 'user', content: 'Идея игры: ' + idea }
    ]);

    // Проверяем что это реальный GDD, а не отказ модели
    const gddMarkers = ['\uD83C\uDFAF', '\uD83C\uDF0D', '\uD83C\uDFAE'];
    const hasGdd = gddMarkers.some(m => content.includes(m));
    if (!hasGdd) {
      showError('error1', '\u274C Опишите идею подробнее — не удалось создать GDD');
      btn.disabled = false;
      btn.innerHTML = '\u2728 Сгенерировать GDD';
      return;
    }
    btn.innerHTML = '<span class="spinner-inline"></span> Проверяем...';
    const ok = await moderateContent(content);

    setStep(2);
    if (!ok) {
      showBlocked();
    } else {
      generatedContent = content;
      showGdd(content);
    }
  } catch (e) {
    showError('error1', '❌ ' + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = '✨ Сгенерировать GDD';
}

function showEditMode() {
  document.getElementById('editMode').style.display = 'block';
  document.getElementById('draftActions').style.display = 'none';
  document.getElementById('editTextarea').value = generatedContent;
}

function applyEdit() {
  generatedContent = document.getElementById('editTextarea').value;
  document.getElementById('draftPreview').innerHTML = renderContent(generatedContent);
  document.getElementById('editMode').style.display = 'none';
  document.getElementById('draftActions').style.display = 'flex';
}

async function handleRegen() {
  const editedText = document.getElementById('editTextarea').value;
  const comment = document.getElementById('regenComment').value.trim();
  hideError('error2');
  const btn = document.getElementById('regenBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span> Регенерируем...';
  try {
    const userMsg = comment
      ? 'Предыдущий вариант:\n' + editedText + '\n\nКомментарий: ' + comment
      : 'Улучши этот GDD:\n' + editedText;
    const content = await callGroq([
      { role: 'system', content: SYSTEM_PROMPT },
      { role: 'user', content: userMsg }
    ]);

    // Проверяем что это реальный GDD, а не отказ модели
    const gddMarkers = ['\uD83C\uDFAF', '\uD83C\uDF0D', '\uD83C\uDFAE'];
    const hasGdd = gddMarkers.some(m => content.includes(m));
    if (!hasGdd) {
      showError('error1', '\u274C Опишите идею подробнее — не удалось создать GDD');
      btn.disabled = false;
      btn.innerHTML = '\u2728 Сгенерировать GDD';
      return;
    }
    btn.innerHTML = '<span class="spinner-inline"></span> Проверяем...';
    const ok = await moderateContent(content);

    if (!ok) {
      showBlocked();
    } else {
      generatedContent = content;
      showGdd(content);
    }
  } catch (e) {
    showError('error2', '❌ ' + e.message);
  }
  btn.disabled = false;
  btn.innerHTML = '🔄 Регенерировать';
}

function goToStep3() {
  hideError('error3');
  setStep(3);
}

async function handlePublish() {
  const title = document.getElementById('titleInput').value.trim();
  const genre = document.getElementById('genreInput').value.trim();
  const author = document.getElementById('authorInput').value.trim();

  hideError('error3');
  if (!title) { showError('error3', 'Введите название игры'); return; }
  if (!author) { showError('error3', 'Введите ваше имя'); return; }

  const btn = document.getElementById('publishBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span> Проверяем...';

  try {
    // Проверяем название
    const titleOk = await moderateField(title);
    if (!titleOk) {
      showError('error3', '🚫 Недопустимое название игры. Измените и попробуйте снова.');
      btn.disabled = false;
      btn.innerHTML = '🚀 Опубликовать в ленту';
      return;
    }

    // Проверяем имя
    const authorOk = await moderateField(author);
    if (!authorOk) {
      showError('error3', '🚫 Недопустимое имя. Измените и попробуйте снова.');
      btn.disabled = false;
      btn.innerHTML = '🚀 Опубликовать в ленту';
      return;
    }

    // Финальная проверка GDD (мог быть отредактирован вручную)
    const contentOk = await moderateContent(generatedContent);
    if (!contentOk) {
      showError('error3', '🚫 Контент GDD содержит недопустимые материалы.');
      btn.disabled = false;
      btn.innerHTML = '🚀 Опубликовать в ленту';
      return;
    }

    btn.innerHTML = '<span class="spinner-inline"></span> Публикуем...';

    const resp = await fetch(SUPABASE_URL + '/rest/v1/drafts', {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify({ title, genre: genre || 'Без жанра', content: generatedContent, author, likes: 0, liked_by: [] })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || 'HTTP ' + resp.status);
    }

    const result = await resp.json();
    const newDraft = Array.isArray(result) ? result[0] : result;
    if (!newDraft || !newDraft.id) throw new Error('Не получили ID нового драфта');

    location.href = 'draft.html?id=' + newDraft.id;
  } catch (e) {
    showError('error3', '❌ ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '🚀 Опубликовать в ленту';
  }
}

function startOver() {
  generatedContent = '';
  document.getElementById('ideaInput').value = '';
  document.getElementById('titleInput').value = '';
  document.getElementById('genreInput').value = '';
  document.getElementById('authorInput').value = '';
  document.getElementById('draftPreview').innerHTML = '';
  document.getElementById('editTextarea').value = '';
  hideError('error1');
  hideError('error2');
  hideError('error3');
  document.getElementById('step2ok').style.display = 'block';
  document.getElementById('step2blocked').style.display = 'none';
  setStep(1);
}
</script>
</body>
</html>
