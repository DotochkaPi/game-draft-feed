<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Создать GDD — Game Draft Feed</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:40px}
.header{background:#12121a;border-bottom:1px solid #2a2a3a;padding:16px 20px;display:flex;align-items:center;gap:12px}
.header a{color:#64748b;text-decoration:none;font-size:14px}
.header a:hover{color:#e2e8f0}
.header h1{font-size:18px;font-weight:700;flex:1}
.container{max-width:600px;margin:0 auto;padding:24px 16px}

/* Steps */
.steps{display:flex;align-items:center;gap:8px;margin-bottom:28px}
.step-dot{width:10px;height:10px;border-radius:50%;background:#2a2a3a;transition:background .3s}
.step-dot.active{background:#21c55d}
.step-dot.done{background:#166534}
.step-line{flex:1;height:2px;background:#2a2a3a;transition:background .3s}
.step-line.done{background:#166534}

/* Cards */
.card{background:#12121a;border:1px solid #2a2a3a;border-radius:12px;padding:20px;margin-bottom:16px}
.card-label{font-size:12px;color:#64748b;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:12px}

/* Inputs */
textarea,input[type=text]{width:100%;background:#0a0a0f;color:#e2e8f0;border:1px solid #2a2a3a;border-radius:8px;padding:14px;font-size:15px;font-family:inherit;outline:none;resize:vertical;transition:border-color .2s}
textarea:focus,input[type=text]:focus{border-color:#21c55d}
textarea{min-height:120px}

/* GDD output */
.gdd-output{font-size:14px;line-height:1.7;color:#e2e8f0}
.gdd-output .section{font-size:15px;font-weight:700;color:#21c55d;margin:14px 0 4px}
.gdd-output .bullet::before{content:"• ";color:#64748b}
.gdd-output .bullet{margin-left:8px;color:#cbd5e1}
.gdd-output .body-text{color:#94a3b8}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:13px 20px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;width:100%;margin-top:10px}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-primary{background:#21c55d;color:#0a0a0f}
.btn-secondary{background:#1e293b;color:#e2e8f0;border:1px solid #2a2a3a}
.btn-ghost{background:transparent;color:#64748b;border:1px solid #2a2a3a}
.btn-row{display:flex;gap:10px}
.btn-row .btn{margin-top:0}

/* Spinner */
.spinner{width:20px;height:20px;border:2px solid #2a2a3a;border-top-color:#21c55d;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;padding:12px 20px;border-radius:8px;font-size:14px;border:1px solid #2a2a3a;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <a href="index.html">← Лента</a>
  <h1>✨ Создать GDD</h1>
</div>

<div class="container">
  <div class="steps">
    <div class="step-dot active" id="dot1"></div>
    <div class="step-line" id="line1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-line" id="line2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>

  <!-- Шаг 1: Идея -->
  <div id="step1">
    <div class="card">
      <div class="card-label">Шаг 1 — Идея игры</div>
      <textarea id="idea-input" placeholder="Например: roguelike про кота-мага, который спасает деревню от роботов в стимпанк мире"></textarea>
    </div>
    <button class="btn btn-primary" id="btn-generate" onclick="generateGDD()">✨ Сгенерировать драфт</button>
  </div>

  <!-- Шаг 2: GDD -->
  <div id="step2" style="display:none">
    <div class="card">
      <div class="card-label">Шаг 2 — GDD Драфт</div>
      <div class="gdd-output" id="gdd-output"></div>
      <div id="edit-area" style="display:none;margin-top:14px">
        <textarea id="gdd-edit" style="min-height:300px"></textarea>
        <div style="font-size:13px;color:#64748b;margin:8px 0">Комментарий к правкам (необязательно)</div>
        <input type="text" id="edit-comment" placeholder="Сделай механику сложнее, добавь кооп...">
      </div>
    </div>
    <div id="view-btns">
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="toggleEdit()">✏️ Редактировать</button>
        <button class="btn btn-primary" onclick="startPublish()">📤 Опубликовать</button>
      </div>
      <button class="btn btn-ghost" style="margin-top:10px" onclick="downloadGDD()">💾 Скачать документ</button>
    </div>
    <div id="edit-btns" style="display:none">
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="cancelEdit()">✕ Отмена</button>
        <button class="btn btn-primary" onclick="regenGDD()">🔄 Перегенерировать</button>
      </div>
    </div>
  </div>

  <!-- Шаг 3: Публикация -->
  <div id="step3" style="display:none">
    <div class="card">
      <div class="card-label">Шаг 3 — Публикация</div>
      <div style="font-size:14px;color:#64748b;margin-bottom:12px">Как тебя зовут? (или оставь анонимом)</div>
      <input type="text" id="author-input" placeholder="Аноним" maxlength="30">
    </div>
    <button class="btn btn-primary" id="btn-publish" onclick="publishDraft()">🚀 Опубликовать в ленту</button>
    <button class="btn btn-ghost" style="margin-top:10px" onclick="cancelPublish()">← Назад к драфту</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const RAW_URL = 'https://raw.githubusercontent.com/DotochkaPi/game-draft-feed/main/data.json';
const GITHUB_TOKEN = ['ghp_2M70F0WOQ', 'p9FF3kCKuICtW4eqVEHeQ4Ui2HW'].join('');
const REPO = 'DotochkaPi/game-draft-feed';
const GROQ_MODEL = 'llama-3.3-70b-versatile';

// ── Key from URL ──────────────────────────────────────────────────────────────
const _urlKey = new URLSearchParams(window.location.search).get('key');
if (_urlKey) localStorage.setItem('groq_key', _urlKey);

// ── State ─────────────────────────────────────────────────────────────────────
let currentGDD = '';
let editMode = false;

// ── Utils ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setStep(n) {
  ['step1','step2','step3'].forEach((id,i) => {
    document.getElementById(id).style.display = i+1 === n ? '' : 'none';
  });
  ['dot1','dot2','dot3'].forEach((id,i) => {
    const d = document.getElementById(id);
    d.className = 'step-dot' + (i+1 < n ? ' done' : i+1 === n ? ' active' : '');
  });
  ['line1','line2'].forEach((id,i) => {
    document.getElementById(id).className = 'step-line' + (i+1 < n ? ' done' : '');
  });
}

function genUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random()*16|0;
    return (c==='x' ? r : (r&0x3|0x8)).toString(16);
  });
}

// ── Groq ──────────────────────────────────────────────────────────────────────
async function groqCall(system, user) {
  let key = localStorage.getItem('groq_key') || '';
  if (!key) {
    const entered = prompt('Введи Groq API ключ (бесплатно: console.groq.com → API Keys):');
    if (entered && entered.trim().startsWith('gsk_')) {
      localStorage.setItem('groq_key', entered.trim());
      key = entered.trim();
    } else throw new Error('Ключ не введён');
  }
  const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + key, 'Content-Type': 'application/json' },
    body: JSON.stringify({ model: GROQ_MODEL, messages: [{role:'system',content:system},{role:'user',content:user}], temperature: 0.8, max_tokens: 1500 })
  });
  if (!resp.ok) throw new Error('Groq ' + resp.status);
  return (await resp.json()).choices[0].message.content;
}

// ── GDD Render ────────────────────────────────────────────────────────────────
function renderGDD(text) {
  const container = document.getElementById('gdd-output');
  container.innerHTML = '';
  text.split('\n').forEach(line => {
    if (!line.trim()) return;
    const el = document.createElement('div');
    if (/^[🎯🎮👥📱💰🔧⚡]/.test(line.trim())) {
      el.className = 'section';
      el.textContent = line.trim();
    } else if (/^[•\-]/.test(line.trim())) {
      el.className = 'bullet';
      el.textContent = line.replace(/^[•\-]\s*/,'').trim();
    } else {
      el.className = 'body-text';
      el.textContent = line.trim();
    }
    container.appendChild(el);
  });
}

// ── Generate GDD ─────────────────────────────────────────────────────────────
async function generateGDD() {
  const idea = document.getElementById('idea-input').value.trim();
  if (!idea) { showToast('Введи идею игры'); return; }

  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Генерирую...';

  try {
    const gdd = await groqCall(
      `Ты Concept Designer в геймдизайн-агентстве. Твоя задача — взять сырую идею и превратить её в чёткий игровой концепт с проработанной механикой.

Напиши GDD-драфт на русском языке СТРОГО в таком формате (никаких вступлений, никакого текста вне формата):

🎯 Концепт
[2-3 предложения. Суть игры, уникальность, ощущение]

🎮 Core Loop
• [действие игрока — результат — мотивация продолжить]
• [второй шаг]
• [третий шаг]
• [как усложняется]

👥 Целевая аудитория
[возраст, портрет игрока, когда и где играет]

📱 Платформа и управление
[платформа + управление]

💰 Монетизация
[конкретная модель]

🔧 Ключевые механики
• [механика 1 — название + как работает]
• [механика 2]
• [механика 3]

⚡ USP — чем отличается от похожих игр
[1-2 предложения, конкретно]`,
      `Идея игры: "${idea}"`
    );
    currentGDD = gdd;
    renderGDD(gdd);
    setStep(2);
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✨ Сгенерировать драфт';
  }
}

// ── Edit ──────────────────────────────────────────────────────────────────────
function toggleEdit() {
  document.getElementById('gdd-edit').value = currentGDD;
  document.getElementById('edit-comment').value = '';
  document.getElementById('edit-area').style.display = '';
  document.getElementById('view-btns').style.display = 'none';
  document.getElementById('edit-btns').style.display = '';
}

function cancelEdit() {
  document.getElementById('edit-area').style.display = 'none';
  document.getElementById('view-btns').style.display = '';
  document.getElementById('edit-btns').style.display = 'none';
}

async function regenGDD() {
  const edited = document.getElementById('gdd-edit').value.trim();
  const comment = document.getElementById('edit-comment').value.trim();
  const btn = document.querySelector('#edit-btns .btn-primary');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Генерирую...';
  try {
    const prompt = comment
      ? `Вот отредактированный GDD:\n${edited}\n\nКомментарий: ${comment}\n\nУлучши GDD с учётом комментария, сохрани формат.`
      : `Вот отредактированный GDD:\n${edited}\n\nПриведи к стандартному формату, улучши формулировки.`;
    const newGDD = await groqCall(
      'Ты Concept Designer. Доработай GDD на русском. Сохрани формат с emoji-заголовками. Только текст GDD, без вступлений.',
      prompt
    );
    currentGDD = newGDD;
    renderGDD(newGDD);
    cancelEdit();
  } catch(e) {
    showToast('Ошибка: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔄 Перегенерировать';
  }
}

function downloadGDD() {
  if (!currentGDD) return;
  const blob = new Blob([currentGDD], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'game-draft.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

// ── Publish ───────────────────────────────────────────────────────────────────
function startPublish() { setStep(3); }
function cancelPublish() { setStep(2); }

async function publishDraft() {
  const author = document.getElementById('author-input').value.trim() || 'Аноним';
  const btn = document.getElementById('btn-publish');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Публикую...';

  try {
    // Загружаем текущие данные
    const dataResp = await fetch(RAW_URL + '?t=' + Date.now());
    const data = dataResp.ok ? await dataResp.json() : { drafts: [] };
    const drafts = data.drafts || [];

    // Извлекаем заголовок и жанр
    const lines = currentGDD.split('\n').filter(l => l.trim());
    const conceptLine = lines.find(l => l.includes('Концепт'));
    const titleLine = lines[lines.indexOf(conceptLine)+1] || lines[0] || '';
    const title = titleLine.replace(/^[🎯🎮👥📱💰🔧⚡•\-]\s*/,'').substring(0,80);

    const genreLine = lines.find(l => l.includes('Жанр') || l.includes('Целевая')) || '';
    const genreMatch = currentGDD.match(/roguelike|runner|tower defense|puzzle|platformer|RPG|strategy|casual|simulation/i);
    const genre = genreMatch ? genreMatch[0] : 'Другое';

    const newDraft = {
      id: genUUID(),
      title: title || 'Без названия',
      genre: genre,
      content: currentGDD,
      author: author,
      createdAt: new Date().toISOString(),
      likes: 0,
      likedBy: []
    };

    drafts.unshift(newDraft);
    const newData = JSON.stringify({ drafts }, null, 2);

    // Получаем SHA текущего data.json
    const shaResp = await fetch('https://api.github.com/repos/' + REPO + '/contents/data.json', {
      headers: { 'Authorization': 'Bearer ' + GITHUB_TOKEN }
    });
    const shaData = await shaResp.json();
    const sha = shaData.sha;

    // Сохраняем
    const putResp = await fetch('https://api.github.com/repos/' + REPO + '/contents/data.json', {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + GITHUB_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'add draft: ' + newDraft.id.substring(0,8), content: btoa(unescape(encodeURIComponent(newData))), sha: sha })
    });

    if (!putResp.ok) throw new Error('Ошибка сохранения: ' + putResp.status);

    window.location.href = 'draft.html?id=' + newDraft.id;
  } catch(e) {
    showToast('Ошибка: ' + e.message);
    btn.disabled = false;
    btn.innerHTML = '🚀 Опубликовать в ленту';
  }
}
</script>
</body>
</html>
