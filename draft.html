<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDD — Game Draft Feed</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0f;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding-bottom:40px}
.header{background:#12121a;border-bottom:1px solid #2a2a3a;padding:16px 20px;display:flex;align-items:center;gap:12px}
.header a{color:#64748b;text-decoration:none;font-size:14px}
.header a:hover{color:#e2e8f0}
.header h1{font-size:18px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.container{max-width:600px;margin:0 auto;padding:24px 16px}
.meta{display:flex;align-items:center;gap:12px;margin-bottom:20px;font-size:14px;color:#64748b}
.author{font-weight:600;color:#94a3b8}
.genre-tag{background:#1e293b;border:1px solid #2a2a3a;border-radius:20px;padding:4px 10px;font-size:12px}
.card{background:#12121a;border:1px solid #2a2a3a;border-radius:12px;padding:20px;margin-bottom:16px}
.gdd-section{font-size:15px;font-weight:700;color:#21c55d;margin:16px 0 6px}
.gdd-section:first-child{margin-top:0}
.gdd-bullet{margin-left:12px;margin-bottom:4px;color:#cbd5e1}
.gdd-bullet::before{content:"• ";color:#64748b}
.gdd-text{color:#94a3b8;line-height:1.6;margin-bottom:4px}
.actions{display:flex;gap:10px;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 16px;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;flex:1}
.btn:active{transform:scale(.97)}
.btn-like{background:#1e293b;color:#e2e8f0;border:1px solid #2a2a3a}
.btn-like.liked{background:#4c0519;color:#fb7185;border-color:#9f1239}
.btn-share{background:#1e293b;color:#e2e8f0;border:1px solid #2a2a3a}
.btn-create{background:#21c55d;color:#0a0a0f;border:none;margin-top:4px}
.spinner-wrap{display:flex;align-items:center;justify-content:center;padding:60px;gap:12px;color:#64748b}
.spinner{width:24px;height:24px;border:2px solid #2a2a3a;border-top-color:#21c55d;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:60px 20px;color:#64748b}
.error h2{font-size:18px;margin-bottom:8px;color:#94a3b8}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#e2e8f0;padding:12px 20px;border-radius:8px;font-size:14px;border:1px solid #2a2a3a;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <a href="index.html">← Лента</a>
  <h1 id="page-title">GDD</h1>
</div>
<div class="container" id="content">
  <div class="spinner-wrap"><div class="spinner"></div> Загружаю...</div>
</div>
<div class="toast" id="toast"></div>

<script>
const RAW_URL = 'https://raw.githubusercontent.com/DotochkaPi/game-draft-feed/main/data.json';
const GITHUB_TOKEN = ['ghp_2M70F0WOQ', 'p9FF3kCKuICtW4eqVEHeQ4Ui2HW'].join('');
const REPO = 'DotochkaPi/game-draft-feed';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function getFingerprint() {
  const fp = navigator.userAgent + screen.width + screen.height + Intl.DateTimeFormat().resolvedOptions().timeZone;
  return btoa(encodeURIComponent(fp)).substring(0, 16);
}

function formatDate(iso) {
  try {
    return new Date(iso).toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'});
  } catch { return iso; }
}

function renderGDD(text, container) {
  container.innerHTML = '';
  (text || '').split('\n').forEach(line => {
    if (!line.trim()) return;
    const el = document.createElement('div');
    if (/^[🎯🎮👥📱💰🔧⚡]/.test(line.trim())) {
      el.className = 'gdd-section';
      el.textContent = line.trim();
    } else if (/^[•\-]/.test(line.trim())) {
      el.className = 'gdd-bullet';
      el.textContent = line.replace(/^[•\-]\s*/,'').trim();
    } else {
      el.className = 'gdd-text';
      el.textContent = line.trim();
    }
    container.appendChild(el);
  });
}

async function loadDraft() {
  const id = new URLSearchParams(window.location.search).get('id');
  const container = document.getElementById('content');

  if (!id) {
    container.innerHTML = '<div class="error"><h2>Драфт не найден</h2><p>Неверная ссылка</p></div>';
    return;
  }

  try {
    const resp = await fetch(RAW_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('Не удалось загрузить данные');
    const data = await resp.json();
    const drafts = data.drafts || [];
    const draft = drafts.find(d => d.id === id);

    if (!draft) {
      container.innerHTML = '<div class="error"><h2>Драфт не найден</h2><p>Возможно он был удалён или ссылка устарела</p></div>';
      return;
    }

    document.getElementById('page-title').textContent = draft.title || 'GDD';
    document.title = (draft.title || 'GDD') + ' — Game Draft Feed';

    const fp = getFingerprint();
    const isLiked = (draft.likedBy || []).includes(fp);

    container.innerHTML = `
      <div class="meta">
        <span class="author">👤 ${draft.author || 'Аноним'}</span>
        <span class="genre-tag">${draft.genre || 'Другое'}</span>
        <span>${formatDate(draft.createdAt)}</span>
      </div>
      <div class="actions">
        <button class="btn btn-like ${isLiked ? 'liked' : ''}" id="btn-like">
          ❤️ ${draft.likes || 0}
        </button>
        <button class="btn btn-share" id="btn-share">🔗 Поделиться</button>
      </div>
      <div class="card" id="gdd-container"></div>
      <a href="create.html" class="btn btn-create" style="display:flex;text-decoration:none;margin-top:8px">✨ Создать похожий</a>
    `;

    renderGDD(draft.content, document.getElementById('gdd-container'));

    // Like
    document.getElementById('btn-like').onclick = async () => {
      const btn = document.getElementById('btn-like');
      btn.disabled = true;

      if (isLiked) { showToast('Вы уже поставили лайк'); btn.disabled = false; return; }

      try {
        const r2 = await fetch(RAW_URL + '?t=' + Date.now());
        const d2 = await r2.json();
        const drafts2 = d2.drafts || [];
        const idx = drafts2.findIndex(x => x.id === id);
        if (idx < 0) throw new Error('Не найден');

        drafts2[idx].likes = (drafts2[idx].likes || 0) + 1;
        drafts2[idx].likedBy = [...(drafts2[idx].likedBy || []), fp];

        const shaResp = await fetch('https://api.github.com/repos/' + REPO + '/contents/data.json', {
          headers: { 'Authorization': 'Bearer ' + GITHUB_TOKEN }
        });
        const shaData = await shaResp.json();

        const newContent = JSON.stringify({ drafts: drafts2 }, null, 2);
        const putResp = await fetch('https://api.github.com/repos/' + REPO + '/contents/data.json', {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + GITHUB_TOKEN, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'like: ' + id.substring(0,8), content: btoa(unescape(encodeURIComponent(newContent))), sha: shaData.sha })
        });

        if (!putResp.ok) throw new Error('Ошибка сохранения');
        btn.className = 'btn btn-like liked';
        btn.innerHTML = '❤️ ' + drafts2[idx].likes;
        showToast('Лайк поставлен!');
      } catch(e) {
        showToast('Ошибка: ' + e.message);
        btn.disabled = false;
      }
    };

    // Share
    document.getElementById('btn-share').onclick = () => {
      navigator.clipboard.writeText(window.location.href).then(() => showToast('Ссылка скопирована!'));
    };

  } catch(e) {
    container.innerHTML = '<div class="error"><h2>Ошибка загрузки</h2><p>' + e.message + '</p></div>';
  }
}

loadDraft();
</script>
</body>
</html>
