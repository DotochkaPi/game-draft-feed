<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDD вЂ” Game Draft Feed</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #e2e8f0;
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }
  .header {
    background: #12121a;
    border-bottom: 1px solid #2a2a3a;
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-inner {
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    gap: 12px;
  }
  .back-link {
    color: #64748b;
    text-decoration: none;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .back-link:hover { color: #e2e8f0; }
  .header-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.15s ease;
  }
  .btn-primary { background: #21c55d; color: #000; }
  .btn-primary:hover { background: #16a34a; }
  .btn-ghost {
    background: transparent;
    color: #64748b;
    border: 1px solid #2a2a3a;
  }
  .btn-ghost:hover { color: #e2e8f0; border-color: #4a4a5a; }
  .container { max-width: 600px; margin: 0 auto; padding: 24px 16px; }
  .genre-tag {
    display: inline-block;
    background: #1a1a2e;
    color: #21c55d;
    border: 1px solid #21c55d33;
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 12px;
  }
  .meta {
    color: #64748b;
    font-size: 0.85rem;
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .divider {
    border: none;
    border-top: 1px solid #2a2a3a;
    margin: 24px 0;
  }
  .content {
    font-size: 0.95rem;
    line-height: 1.7;
    color: #e2e8f0;
  }
  .content h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: #21c55d;
    margin: 20px 0 8px;
  }
  .content h3 {
    font-size: 1rem;
    font-weight: 600;
    color: #a3e635;
    margin: 16px 0 6px;
  }
  .content p { margin-bottom: 12px; }
  .content ul, .content ol {
    padding-left: 20px;
    margin-bottom: 12px;
  }
  .content li { margin-bottom: 4px; }
  .content strong { color: #f1f5f9; }
  .content em { color: #94a3b8; }
  .content pre {
    background: #1e1e2e;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 12px;
    overflow-x: auto;
    font-size: 0.85rem;
    margin-bottom: 12px;
  }
  .content code {
    background: #1e1e2e;
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 0.85em;
  }
  .content pre code { background: none; padding: 0; }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .like-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid #2a2a3a;
    background: transparent;
    color: #64748b;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 600;
    transition: all 0.15s ease;
  }
  .like-btn:hover { border-color: #ef4444; color: #ef4444; }
  .like-btn.liked { background: #ef444422; border-color: #ef4444; color: #ef4444; }
  .like-btn.liked:hover { background: transparent; color: #64748b; border-color: #2a2a3a; }
  .spinner {
    display: flex;
    justify-content: center;
    padding: 80px;
  }
  .spin {
    width: 36px; height: 36px;
    border: 3px solid #2a2a3a;
    border-top-color: #21c55d;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    text-align: center;
    padding: 60px 24px;
    color: #ef4444;
  }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #21c55d;
    color: #000;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: transform 0.3s ease;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <a href="index.html" class="back-link">в†ђ Р›РµРЅС‚Р°</a>
    <div class="header-actions">
      <a href="create.html" class="btn btn-primary">вњЁ РЎРѕР·РґР°С‚СЊ РїРѕС…РѕР¶РёР№</a>
    </div>
  </div>
</header>

<div class="container" id="root">
  <div class="spinner"><div class="spin"></div></div>
</div>

<div class="toast" id="toast"></div>

<script>
const RAW_URL = 'https://raw.githubusercontent.com/DotochkaPi/game-draft-feed/main/data.json';
const API_URL = 'https://api.github.com/repos/DotochkaPi/game-draft-feed/contents/data.json';
const GH_TOKEN = ['ghp_2M70F','0WOQp9FF3','kCKuICtW4','eqVEHeQ4Ui2HW'].join('');

const id = new URLSearchParams(location.search).get('id');
let currentDraft = null;
let allDrafts = [];
let dataSha = '';

function getFingerprint() {
  const fp = navigator.userAgent + screen.width + screen.height + Intl.DateTimeFormat().resolvedOptions().timeZone;
  return btoa(fp).substring(0, 16);
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'С‚РѕР»СЊРєРѕ С‡С‚Рѕ';
  if (m < 60) return m + ' РјРёРЅ РЅР°Р·Р°Рґ';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' С‡ РЅР°Р·Р°Рґ';
  const d = Math.floor(h / 24);
  return d + ' РґРЅ РЅР°Р·Р°Рґ';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderMarkdown(text) {
  // Simple markdown renderer
  let html = escHtml(text);
  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Bullet lists
  html = html.replace(/^[-вЂў] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
  // Numbered lists
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Paragraphs (double newline)
  html = html.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (p.startsWith('<h') || p.startsWith('<ul') || p.startsWith('<li')) return p;
    return '<p>' + p.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
  return html;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function renderDraft(draft) {
  const fp = getFingerprint();
  const liked = (draft.likedBy || []).includes(fp);
  const root = document.getElementById('root');
  root.innerHTML = `
    <span class="genre-tag">${escHtml(draft.genre || 'Р”СЂСѓРіРѕРµ')}</span>
    <h1>${escHtml(draft.title || 'Р‘РµР· РЅР°Р·РІР°РЅРёСЏ')}</h1>
    <div class="meta">
      <span>рџ‘¤ ${escHtml(draft.author || 'РђРЅРѕРЅРёРј')}</span>
      <span>рџ•ђ ${timeAgo(draft.createdAt)}</span>
    </div>
    <hr class="divider">
    <div class="content">${renderMarkdown(draft.content || '')}</div>
    <div class="actions">
      <button class="like-btn ${liked ? 'liked' : ''}" id="like-btn" onclick="toggleLike()">
        вќ¤пёЏ <span id="like-count">${draft.likes || 0}</span>
      </button>
      <button class="btn btn-ghost" onclick="share()">рџ”— РџРѕРґРµР»РёС‚СЊСЃСЏ</button>
    </div>
  `;
  document.title = (draft.title || 'GDD') + ' вЂ” Game Draft Feed';
}

async function loadDraft() {
  const root = document.getElementById('root');
  if (!id) {
    root.innerHTML = '<div class="error">Р§РµСЂРЅРѕРІРёРє РЅРµ РЅР°Р№РґРµРЅ. <a href="index.html" style="color:#21c55d">в†ђ Р’ Р»РµРЅС‚Сѓ</a></div>';
    return;
  }
  try {
    const resp = await fetch(RAW_URL + '?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    // Get SHA for updates
    const apiResp = await fetch(API_URL, { headers: { Authorization: 'token ' + GH_TOKEN } });
    const apiData = await apiResp.json();
    dataSha = apiData.sha;
    allDrafts = data.drafts || [];
    currentDraft = allDrafts.find(d => d.id === id);
    if (!currentDraft) {
      root.innerHTML = '<div class="error">Р§РµСЂРЅРѕРІРёРє РЅРµ РЅР°Р№РґРµРЅ. <a href="index.html" style="color:#21c55d">в†ђ Р’ Р»РµРЅС‚Сѓ</a></div>';
      return;
    }
    renderDraft(currentDraft);
  } catch(e) {
    root.innerHTML = `<div class="error">РћС€РёР±РєР°: ${e.message}<br><br><button class="btn btn-ghost" onclick="loadDraft()">РџРѕРІС‚РѕСЂРёС‚СЊ</button></div>`;
  }
}

async function toggleLike() {
  if (!currentDraft) return;
  const btn = document.getElementById('like-btn');
  const fp = getFingerprint();
  const likedBy = currentDraft.likedBy || [];
  const alreadyLiked = likedBy.includes(fp);
  
  btn.disabled = true;
  
  if (alreadyLiked) {
    currentDraft.likedBy = likedBy.filter(x => x !== fp);
    currentDraft.likes = Math.max(0, (currentDraft.likes || 0) - 1);
    btn.classList.remove('liked');
  } else {
    currentDraft.likedBy = [...likedBy, fp];
    currentDraft.likes = (currentDraft.likes || 0) + 1;
    btn.classList.add('liked');
  }
  document.getElementById('like-count').textContent = currentDraft.likes;
  
  // Update in allDrafts
  const idx = allDrafts.findIndex(d => d.id === id);
  if (idx >= 0) allDrafts[idx] = currentDraft;
  
  try {
    await saveData({ drafts: allDrafts });
    showToast(alreadyLiked ? 'Р›Р°Р№Рє СѓР±СЂР°РЅ' : 'вќ¤пёЏ Р›Р°Р№Рє!');
  } catch(e) {
    showToast('РћС€РёР±РєР° СЃРѕС…СЂР°РЅРµРЅРёСЏ');
    // Revert
    if (alreadyLiked) {
      currentDraft.likedBy = [...(currentDraft.likedBy || []), fp];
      currentDraft.likes = (currentDraft.likes || 0) + 1;
    } else {
      currentDraft.likedBy = (currentDraft.likedBy || []).filter(x => x !== fp);
      currentDraft.likes = Math.max(0, (currentDraft.likes || 0) - 1);
    }
    document.getElementById('like-count').textContent = currentDraft.likes;
    btn.classList.toggle('liked');
  } finally {
    btn.disabled = false;
  }
}

async function saveData(data) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = JSON.stringify({
    message: 'update: likes',
    content,
    sha: dataSha
  });
  const resp = await fetch(API_URL, {
    method: 'PUT',
    headers: {
      'Authorization': 'token ' + GH_TOKEN,
      'Content-Type': 'application/json'
    },
    body
  });
  if (!resp.ok) throw new Error('GitHub ' + resp.status);
  const result = await resp.json();
  dataSha = result.content.sha;
}

function share() {
  navigator.clipboard.writeText(location.href).then(() => {
    showToast('РЎСЃС‹Р»РєР° СЃРєРѕРїРёСЂРѕРІР°РЅР°!');
  }).catch(() => {
    const dummy = document.createElement('input');
    document.body.appendChild(dummy);
    dummy.value = location.href;
    dummy.select();
    document.execCommand('copy');
    document.body.removeChild(dummy);
    showToast('РЎСЃС‹Р»РєР° СЃРєРѕРїРёСЂРѕРІР°РЅР°!');
  });
}

loadDraft();
</script>
</body>
</html>
